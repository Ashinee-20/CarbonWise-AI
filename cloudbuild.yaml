steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/carbonwise/carbonwise-ai:$BUILD_ID
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/carbonwise/carbonwise-ai:$BUILD_ID
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - carbonwise-ai
      - --image
      - us-central1-docker.pkg.dev/$PROJECT_ID/carbonwise/carbonwise-ai:$BUILD_ID
      - --region
      - us-central1
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"
images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/carbonwise/carbonwise-ai:$BUILD_ID
